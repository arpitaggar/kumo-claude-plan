name: kumo_claude
description: "Kumo - A collaborative travel planning super-app with real-time sync, AI-powered itinerary generation, expense splitting, and fintech integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1
  flutter: ">=3.13.0"

dependencies:
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.3.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_riverpod: ^2.4.0
  flutter_svg: ^2.0.0
  go_router: ^14.0.0
  hooks_riverpod: ^2.4.0
  intl: ^0.19.0
  json_annotation: ^4.8.0
  json_serializable: ^6.7.0
  logger: ^2.0.0
  material_design_icons_flutter: ^7.0.7296
  riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  share_plus: ^10.0.0
  shared_preferences: ^2.2.0
  supabase: ^2.12.0
  supabase_flutter: ^2.0.0
  uuid: ^4.0.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - .env.development
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
